services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus
      POSTGRES_DB: cloudnative
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarkus"]
      interval: 2s
      timeout: 3s
      retries: 10
